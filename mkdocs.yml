site_name: FlowLink — Runtime AI Firewall
site_url: https://braincreator.github.io/flowlink-ai-firewall/
site_description: Runtime AI Firewall — intercepts AI agent commands, blocks shell injection, credential theft, and data exfiltration in under 1ms.
site_author: FlowMasters
repo_url: https://github.com/braincreator/flowlink-ai-firewall
repo_name: braincreator/flowlink-ai-firewall

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: black
      accent: orange
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.annotate

plugins:
  - search:
      lang: en
  - social:
      cards: !ENV [CI, false]

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/braincreator/flowlink-ai-firewall
    - icon: fontawesome/solid/globe
      link: https://flowlink.flow-masters.ru
    - icon: fontawesome/solid/envelope
      link: mailto:contact@flow-masters.ru

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - API Reference: api.md
  - Deployment: deployment.md
  - Comparison: comparison.md
  - Security: security.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
